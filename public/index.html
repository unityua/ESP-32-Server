<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ESP32 Control</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0e0f; --panel:#11181a; --line:#1f2c2e;
    --txt:#e6efea; --dim:#6f8079; --accent:#3ddc91;
    --red:#ff4d4d; --yellow:#ffcc33; --blue:#4d8bff; --green:#3ddc91;
    --mono:'Space Mono',monospace; --sans:'Sora',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:var(--sans);background:var(--bg);color:var(--txt);
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    padding:24px;
    background-image:radial-gradient(circle at 20% 10%,rgba(61,220,145,.08),transparent 40%),
                     radial-gradient(circle at 90% 90%,rgba(77,139,255,.06),transparent 40%);
  }
  .card{
    width:100%;max-width:440px;background:var(--panel);
    border:1px solid var(--line);border-radius:16px;padding:32px;
    box-shadow:0 24px 60px rgba(0,0,0,.5);
  }
  .brand{font-family:var(--mono);font-size:13px;letter-spacing:3px;
    color:var(--accent);text-transform:uppercase;margin-bottom:6px}
  h1{font-size:24px;font-weight:700;margin-bottom:24px;letter-spacing:-.5px}
  label{display:block;font-family:var(--mono);font-size:11px;letter-spacing:1px;
    color:var(--dim);text-transform:uppercase;margin:14px 0 6px}
  input{
    width:100%;background:#0a1011;border:1px solid var(--line);
    color:var(--txt);padding:12px 14px;border-radius:9px;font-size:15px;
    font-family:var(--mono);outline:none;transition:border .2s;
  }
  input:focus{border-color:var(--accent)}
  button{
    width:100%;margin-top:22px;padding:13px;border:none;border-radius:9px;
    font-family:var(--sans);font-weight:600;font-size:15px;cursor:pointer;
    background:var(--accent);color:#04140c;transition:transform .1s,opacity .2s;
  }
  button:hover{opacity:.9}
  button:active{transform:scale(.98)}
  .err{color:var(--red);font-family:var(--mono);font-size:13px;
    margin-top:14px;min-height:18px}
  .hidden{display:none}

  /* dashboard */
  .row{display:flex;justify-content:space-between;align-items:center;
    padding:14px 0;border-bottom:1px solid var(--line)}
  .row:last-of-type{border-bottom:none}
  .row .k{font-family:var(--mono);font-size:12px;letter-spacing:1px;color:var(--dim)}
  .row .v{font-family:var(--mono);font-size:14px}
  .status-dot{display:inline-block;width:9px;height:9px;border-radius:50%;
    margin-right:7px;vertical-align:middle}
  .ledbox{
    margin:22px 0;padding:26px;border-radius:12px;text-align:center;
    border:1px solid var(--line);background:#0a1011;transition:.3s;
  }
  .ledbox .state{font-family:var(--mono);font-size:30px;font-weight:700;
    letter-spacing:2px}
  .ledbox .sub{font-family:var(--mono);font-size:11px;color:var(--dim);
    letter-spacing:2px;text-transform:uppercase;margin-top:6px}
  .btns{display:flex;gap:12px}
  .btns button{margin-top:0}
  .btn-on{background:var(--green);color:#04140c}
  .btn-off{background:var(--blue);color:#04101e}
  .ghost{background:transparent;border:1px solid var(--line);color:var(--dim);
    font-size:13px;margin-top:18px}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="card" id="loginCard">
  <div class="brand">// esp32-c3 node</div>
  <h1>Device Access</h1>
  <label for="u">Username</label>
  <input id="u" autocomplete="username" placeholder="alice" />
  <label for="p">Password</label>
  <input id="p" type="password" autocomplete="current-password" placeholder="••••••••" />
  <button id="loginBtn">Authenticate</button>
  <div class="err" id="loginErr"></div>
</div>

<!-- DASHBOARD -->
<div class="card hidden" id="dashCard">
  <div class="brand">// connected</div>
  <h1 id="hello">Device</h1>

  <div class="row"><span class="k">User</span><span class="v" id="dUser">—</span></div>
  <div class="row"><span class="k">Device ID</span><span class="v" id="dId">—</span></div>
  <div class="row"><span class="k">Connection</span>
    <span class="v"><span class="status-dot" id="dDot"></span><span id="dOnline">—</span></span></div>

  <div class="ledbox" id="ledbox">
    <div class="state" id="ledState">—</div>
    <div class="sub">led signal</div>
  </div>

  <div class="btns">
    <button class="btn-on" id="onBtn">Turn On</button>
    <button class="btn-off" id="offBtn">Turn Off</button>
  </div>
  <button class="ghost" id="logoutBtn">Log out</button>
  <div class="err" id="dashErr"></div>
</div>

<script>
const API = ''; // same origin
let token = null, poll = null;
// The token lives only in this JS variable — never in localStorage or
// cookies. Closing the tab logs you out. That is intentional.

const $ = id => document.getElementById(id);

async function api(path, opts={}){
  opts.headers = Object.assign({'Content-Type':'application/json'}, opts.headers||{});
  if(token) opts.headers.Authorization = 'Bearer '+token;
  const r = await fetch(API+path, opts);
  if(r.status === 401 && token){ logout(); throw new Error('session expired'); }
  if(!r.ok) throw new Error((await r.json().catch(()=>({}))).error || r.status);
  return r.json();
}

async function login(){
  $('loginErr').textContent = '';
  try{
    const data = await api('/api/login',{method:'POST',
      body:JSON.stringify({username:$('u').value.trim(),password:$('p').value})});
    token = data.token;
    $('p').value = '';
    $('loginCard').classList.add('hidden');
    $('dashCard').classList.remove('hidden');
    $('hello').textContent = data.username + "'s Device";
    refresh();
    poll = setInterval(refresh, 3000);
  }catch(e){ $('loginErr').textContent = 'Login failed: '+e.message; }
}

function paintLed(led, online){
  const box=$('ledbox'), st=$('ledState');
  st.textContent = led ? 'ON' : 'OFF';
  box.style.borderColor = led ? 'var(--green)' : 'var(--blue)';
  box.style.boxShadow = led
    ? '0 0 32px rgba(61,220,145,.25) inset'
    : '0 0 32px rgba(77,139,255,.2) inset';
  st.style.color = led ? 'var(--green)' : 'var(--blue)';
  const dot=$('dDot');
  dot.style.background = online ? 'var(--green)' : 'var(--red)';
  $('dOnline').textContent = online ? 'online' : 'offline';
}

async function refresh(){
  try{
    const m = await api('/api/me');
    $('dUser').textContent = m.username;
    $('dId').textContent = m.deviceId;
    paintLed(m.led, m.online);
  }catch(e){ $('dashErr').textContent = e.message; }
}

async function setLed(on){
  $('dashErr').textContent='';
  try{ await api('/api/led',{method:'POST',body:JSON.stringify({on})}); refresh(); }
  catch(e){ $('dashErr').textContent = e.message; }
}

async function logout(){
  try{ if(token) await fetch('/api/logout',{method:'POST',
    headers:{Authorization:'Bearer '+token}}); }catch(e){}
  token=null; clearInterval(poll);
  $('dashCard').classList.add('hidden');
  $('loginCard').classList.remove('hidden');
  $('u').value=''; $('p').value='';
  $('dashErr').textContent='';
}

$('loginBtn').onclick = login;
$('p').addEventListener('keydown',e=>{if(e.key==='Enter')login()});
$('onBtn').onclick = ()=>setLed(true);
$('offBtn').onclick = ()=>setLed(false);
$('logoutBtn').onclick = logout;
</script>
</body>
</html>
